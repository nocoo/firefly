name: Quality Gate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for gitleaks

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # G1: Static Analysis
      - name: "G1: typecheck"
        run: bun run typecheck

      - name: "G1: lint"
        run: bun run lint

      # L1: Unit Tests with coverage
      - name: "L1: unit tests (coverage ≥90%)"
        run: bun run test:coverage

      # G2: Security — install tools then run unified script
      - name: Install osv-scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Install gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks

      - name: "G2: security scan"
        run: bun run security
