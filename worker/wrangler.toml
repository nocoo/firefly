name = "firefly"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# [[routes]]
# pattern = "your-worker.example.com"
# custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "firefly-db"
database_id = "YOUR_D1_DATABASE_ID"

# ---------- Test environment ----------
[env.test]
name = "firefly-test"

[[env.test.d1_databases]]
binding = "DB"
database_name = "firefly-db-test"
database_id = "YOUR_D1_TEST_DATABASE_ID"

[[env.test.r2_buckets]]
binding = "BUCKET"
bucket_name = "firefly-test"
