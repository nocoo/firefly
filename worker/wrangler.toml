name = "firefly"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[[routes]]
pattern = "firefly.worker.dev"       # Customize to your domain
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "firefly-db"        # Create via: wrangler d1 create firefly-db
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ---------- Test environment ----------
[env.test]
name = "firefly-test"

[[env.test.d1_databases]]
binding = "DB"
database_name = "firefly-db-test"    # Create via: wrangler d1 create firefly-db-test --env test
database_id = "REPLACE_WITH_YOUR_TEST_D1_DATABASE_ID"

[[env.test.r2_buckets]]
binding = "BUCKET"
bucket_name = "firefly-test"        # Create via: wrangler r2 bucket create firefly-test
